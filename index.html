<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>TechMarket - Tu Tienda TI</title>
</head>
<body>

    <header class="header">
        <div class="logo">TechMarket</div>

        <div class="search-bar">
            <input type="text" placeholder="Buscar componentes, licencias y más...">
            <button>Buscar</button>
        </div>

        <div class="user-menu">
            <div class="auth-buttons" id="ui-invitado">
                <button class="btn-auth" onclick="mostrarLogin()">Iniciar sesión</button>
                <button class="btn-auth" onclick="mostrarRegistro()">Registrarse</button>
            </div>
            
            <div class="auth-buttons" id="ui-usuario" style="display: none; align-items: center; gap: 15px;">
                <span id="nombre-usuario-display" style="font-weight: bold; color: #2d3277;"></span>
                <button class="btn-auth" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>

            <div class="cart" style="cursor: pointer;" onclick="verCarrito()">
                🛒 (<span id="cantidad-carrito">0</span>)
            </div>
        </div>
    </header>

    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <button class="cerrar" onclick="cerrarForm()">×</button>
            
            <div id="loginForm" class="form-box active">
                <h3>Iniciar sesión</h3>
                <div class="input-group">
                    <label for="emailLogin">Correo electrónico</label>
                    <input type="email" id="emailLogin" required>
                </div>
                <div class="input-group">
                    <label for="passwordLogin">Contraseña</label>
                    <input type="password" id="passwordLogin" required>
                </div>
                <button class="btn-primary" onclick="login()">Continuar</button>
                <p class="switch">¿Eres nuevo en TechMarket? <span onclick="irARegistro()">Crea tu cuenta</span></p>
            </div>

            <div class="auth-container" id="detallesContainer" style="display: none; z-index: 1001;">
                <div class="auth-box" style="max-width: 500px; text-align: center;">
                <button class="cerrar" onclick="cerrarDetalles()">×</button>
                    <div id="contenidoDetalles">
                    </div>
                </div>
            </div>

            <div id="registerForm" class="form-box">
                <h3>Crear cuenta</h3>
                
                <div class="input-group">
                    <label for="nombreRegister">Tu nombre</label>
                    <input type="text" id="nombreRegister" placeholder="Nombre y apellido" required>
                </div>

                <div class="input-group">
                    <label for="telRegister">Número de celular (opcional)</label>
                    <input type="tel" id="telRegister">
                </div>

                <div class="input-group">
                    <label for="emailRegister">Correo electrónico</label>
                    <input type="email" id="emailRegister" required>
                </div>

                <div class="input-group">
                    <label for="passwordRegister">Contraseña</label>
                    <input type="password" id="passwordRegister" placeholder="Al menos 6 caracteres" required>
                </div>

                <div class="input-group">
                    <label for="passwordConfirm">Vuelve a escribir la contraseña</label>
                    <input type="password" id="passwordConfirm" required>
                </div>
                
                <button class="btn-primary" onclick="register()">Crear tu cuenta</button>
                <p class="switch">¿Ya tienes una cuenta? <span onclick="irALogin()">Inicia sesión</span></p>
            </div>

            <p id="mensaje"></p>
        </div>
    </div>

    <div class="main-container">
        
        <aside class="sidebar">
            <h3>Categorías</h3>
            <ul class="filter-list">
                <li><label><input type="radio" name="categoria" value="todos" checked> Todos</label></li>
                <li><label><input type="radio" name="categoria" value="hardware"> Hardware</label></li>
                <li><label><input type="radio" name="categoria" value="electrónica"> Electrónica</label></li>
                <li><label><input type="radio" name="categoria" value="servicios"> Servicios</label></li>
            </ul>
        </aside>

        <main class="product-grid" id="catalogo">
            </main>
    </div>

    <script src="app.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // Datos de la Base de Datos
        const firebaseConfig = {
            apiKey: "AIzaSyCvxilsuHcDCynIDoaAbNBCvoY47OCuv0g",
            authDomain: "paginawebuanlevidencia.firebaseapp.com",
            projectId: "paginawebuanlevidencia",
            storageBucket: "paginawebuanlevidencia.firebasestorage.app",
            messagingSenderId: "333532326502",
            appId: "1:333532326502:web:6e98985eaf107d4cc01ba7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 

        // ====================================================================
        // ESTADO DE SESIÓN (Ocultar/Mostrar botones)
        // ====================================================================
        onAuthStateChanged(auth, async (user) => {
            const uiInvitado = document.getElementById('ui-invitado');
            const uiUsuario = document.getElementById('ui-usuario');
            const nombreDisplay = document.getElementById('nombre-usuario-display');

            if (user) {
                // El usuario inició sesión
                uiInvitado.style.display = 'none';
                uiUsuario.style.display = 'flex';
                
                // Buscar el nombre en Firestore usando su UID
                try {
                    const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                    if (docSnap.exists()) {
                        nombreDisplay.innerText = `Hola, ${docSnap.data().nombre}`;
                    } else {
                        nombreDisplay.innerText = `Hola, Usuario`;
                    }
                } catch (error) {
                    console.error("Error al obtener nombre:", error);
                }
            } else {
                // No hay sesión activa
                uiInvitado.style.display = 'flex';
                uiUsuario.style.display = 'none';
                nombreDisplay.innerText = '';
            }
        });

        // Función para cerrar sesión
        window.cerrarSesion = async function() {
            try {
                await signOut(auth);
                alert("Has cerrado sesión exitosamente.");
            } catch (error) {
                console.error("Error al cerrar sesión:", error);
            }
        };

        // ====================================================================
        // LÓGICA DEL CARRITO
        // ====================================================================
        let carrito = [];

        window.agregarAlCarrito = function(nombre, precio) {
            carrito.push({ nombre, precio });
            document.getElementById('cantidad-carrito').innerText = carrito.length;
            alert(`"${nombre}" se agregó al carrito.`);
        };

        window.verCarrito = function() {
            if(carrito.length === 0) {
                alert("Tu carrito está vacío.");
                return;
            }
            let total = 0;
            let lista = "Tus productos:\n\n";
            carrito.forEach((item, index) => {
                lista += `${index + 1}. ${item.nombre} - $${item.precio}\n`;
                total += item.precio;
            });
            lista += `\nTotal: $${total}`;
            alert(lista); // Por ahora lo mostramos en un alert simple
        };

        // ====================================================================
        // LÓGICA DE DETALLES DEL PRODUCTO
        // ====================================================================
        window.verDetalles = function(nombre, precio, imagen, categoria) {
            const contenido = document.getElementById('contenidoDetalles');
            contenido.innerHTML = `
                <img src="${imagen}" alt="${nombre}" style="width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px;">
                <span class="category-tag" style="display: inline-block; margin-bottom: 10px;">${categoria}</span>
                <h2 style="margin-bottom: 10px; color: #0F1111;">${nombre}</h2>
                <h1 style="color: #B12704; margin-bottom: 20px;">$${precio}</h1>
                <p style="color: #555; margin-bottom: 20px;">Este es un producto de alta calidad de la categoría ${categoria}. Ideal para potenciar tus proyectos tecnológicos.</p>
                <button class="btn-primary" onclick="agregarAlCarrito('${nombre}', ${precio}); cerrarDetalles();">Agregar al carrito</button>
            `;
            document.getElementById('detallesContainer').style.display = 'flex';
        };

        window.cerrarDetalles = function() {
            document.getElementById('detallesContainer').style.display = 'none';
        };

        // ====================================================================
        // CARGA DE PRODUCTOS DESDE FIREBASE
        // ====================================================================
        async function cargarProductos() {
            const contenedorCatalogo = document.getElementById("catalogo");
            try {
                const querySnapshot = await getDocs(collection(db, "productos"));
                contenedorCatalogo.innerHTML = ""; // Limpiamos el contenedor primero

                querySnapshot.forEach((doc) => {
                    const producto = doc.data();
                    
                    contenedorCatalogo.innerHTML += `
                        <div class="product-card" data-categoria="${producto.categoria.toLowerCase()}">
                            <div class="product-image">
                                <img src="${producto.imagenUrl}" alt="${producto.nombre}" style="width:100%; height:100%; object-fit:contain; padding:10px;">
                            </div>
                            <div class="product-info">
                                <span class="category-tag">${producto.categoria}</span>
                                <h4 class="product-title">${producto.nombre}</h4>
                                <p class="product-price">$${producto.precio}</p>
                                
                                <button class="btn-details" onclick="verDetalles('${producto.nombre}', ${producto.precio}, '${producto.imagenUrl}', '${producto.categoria}')">Ver detalles</button>
                                
                                <button class="btn-primary" style="margin-top: 8px;" onclick="agregarAlCarrito('${producto.nombre}', ${producto.precio})">🛒 Agregar</button>
                            </div>
                        </div>
                    `;
                }); // Cierre del ciclo forEach

            } catch (error) {
                console.error("Error al cargar:", error);
            }
        }

        // ====================================================================
        // FILTROS LATERALES
        // ====================================================================
        const botonesFiltro = document.querySelectorAll('input[name="categoria"]');
        botonesFiltro.forEach(boton => {
            boton.addEventListener('change', (evento) => {
                const categoriaSeleccionada = evento.target.value; 
                const tarjetas = document.querySelectorAll('.product-card');

                tarjetas.forEach(tarjeta => {
                    // Normalizamos para evitar problemas con acentos ("electrónica" vs "electronica")
                    const categoriaTarjeta = tarjeta.dataset.categoria.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    const catSelecLimpia = categoriaSeleccionada.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

                    if (catSelecLimpia === 'todos' || categoriaTarjeta === catSelecLimpia) {
                        tarjeta.style.display = 'block'; 
                    } else {
                        tarjeta.style.display = 'none'; 
                    }
                });
            });
        });

        // ====================================================================
        // BARRA DE BÚSQUEDA
        // ====================================================================
        const inputBusqueda = document.querySelector('.search-bar input');
        inputBusqueda.addEventListener('input', (evento) => {
            const textoBuscado = evento.target.value.toLowerCase();
            const tarjetas = document.querySelectorAll('.product-card');

            tarjetas.forEach(tarjeta => {
                const tituloProducto = tarjeta.querySelector('.product-title').textContent.toLowerCase();
                if (tituloProducto.includes(textoBuscado)) {
                    tarjeta.style.display = 'block';
                } else {
                    tarjeta.style.display = 'none';
                }
            });
        });

        // ====================================================================
        // LÓGICA DE NEGOCIO REAL (FIREBASE AUTH Y FIRESTORE)
        // ====================================================================

        window.register = async function() {
            const nombre = document.getElementById("nombreRegister").value.trim();
            const email = document.getElementById("emailRegister").value.trim();
            const tel = document.getElementById("telRegister").value.trim();
            const pass = document.getElementById("passwordRegister").value;
            const passConfirm = document.getElementById("passwordConfirm").value;
            const mensaje = document.getElementById("mensaje");

            // Validaciones básicas
            if (nombre === "" || email === "" || pass === "" || passConfirm === "") {
                mensaje.innerText = "Error: Todos los campos obligatorios deben llenarse.";
                mensaje.style.color = "#d93025";
                return;
            }
            if (pass.length < 6) {
                mensaje.innerText = "La contraseña debe tener al menos 6 caracteres.";
                mensaje.style.color = "#d93025";
                return;
            }
            if (pass !== passConfirm) {
                mensaje.innerText = "Las contraseñas no coinciden.";
                mensaje.style.color = "#d93025";
                return;
            }

            mensaje.innerText = "Creando cuenta...";
            mensaje.style.color = "#007185";

            try {
                // 1. Crear el usuario en Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Guardar el nombre y teléfono en Firestore en una colección "usuarios"
                // Usamos el UID (ID único) del usuario como nombre del documento
                await setDoc(doc(db, "usuarios", user.uid), {
                    nombre: nombre,
                    telefono: tel,
                    email: email,
                    fechaRegistro: new Date()
                });

                mensaje.innerText = "¡Cuenta creada con éxito! Redirigiendo...";
                mensaje.style.color = "#28a745";

                setTimeout(() => {
                    window.irALogin();
                    mensaje.innerText = "";
                    document.getElementById("nombreRegister").value = "";
                    document.getElementById("emailRegister").value = "";
                    document.getElementById("telRegister").value = "";
                    document.getElementById("passwordRegister").value = "";
                    document.getElementById("passwordConfirm").value = "";
                }, 2000);

            } catch (error) {
                console.error("Error al registrar:", error);
                if (error.code === 'auth/email-already-in-use') {
                    mensaje.innerText = "Este correo ya está registrado.";
                } else {
                    mensaje.innerText = "Error al crear la cuenta: " + error.message;
                }
                mensaje.style.color = "#d93025";
            }
        }

        window.login = async function() {
            const email = document.getElementById("emailLogin").value.trim();
            const pass = document.getElementById("passwordLogin").value;
            const mensaje = document.getElementById("mensaje");

            if (email === "" || pass === "") {
                mensaje.innerText = "Por favor, ingresa tu correo y contraseña.";
                mensaje.style.color = "#d93025";
                return;
            }

            mensaje.innerText = "Verificando credenciales...";
            mensaje.style.color = "#007185";

            try {
                // Iniciar sesión con Firebase
                await signInWithEmailAndPassword(auth, email, pass);
                
                mensaje.innerText = "¡Inicio de sesión exitoso!";
                mensaje.style.color = "#28a745";

                setTimeout(() => {
                    window.cerrarForm();
                    alert("Bienvenido a TechMarket");
                    mensaje.innerText = "";
                    document.getElementById("emailLogin").value = "";
                    document.getElementById("passwordLogin").value = "";
                }, 1000);

            } catch (error) {
                console.error("Error al iniciar sesión:", error);
                mensaje.innerText = "Correo o contraseña incorrectos.";
                mensaje.style.color = "#d93025";
            }
        }

        // Inicializar catálogo al abrir la página
        cargarProductos();
    </script>
</body>
</html>
